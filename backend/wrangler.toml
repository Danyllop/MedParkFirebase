name = "medparkbackend"
main = "src/server.ts"
compatibility_date = "2024-03-18"
compatibility_flags = [ "nodejs_compat" ]

[vars]
NODE_ENV = "production"
JWT_EXPIRES_IN = "24h"
DEFAULT_PASSWORD = "Mud@1234"

# IMPORTANT:
# DATABASE_URL, JWT_SECRET, and PEPPER_SECRET should be set as SECRETS
# in the Cloudflare Dashboard (Settings > Variables > Add Secret) 
# or via the command line: 'npx wrangler secret put KEY_NAME'.
#
# Secrets are persistent and are NOT cleared during redeploys.
